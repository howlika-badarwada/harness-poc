version: '3.8'

services:
  drone-server:
    image: drone/drone:2
    container_name: drone-server
    ports:
      - "8080:80"
    volumes:
      - drone-data:/data
    environment:
      # Core server
      - DRONE_SERVER_HOST=127.0.0.1:8080       # replace with public host if accessible externally
      - DRONE_SERVER_PROTO=http                 # use https if you have TLS/ingress
      - DRONE_RPC_SECRET=supersecret            # must match runner

      # GitHub OAuth (configure these with your own credentials)
      - DRONE_GITHUB_SERVER=https://github.com
      - DRONE_GITHUB_CLIENT_ID=${DRONE_GITHUB_CLIENT_ID}
      - DRONE_GITHUB_CLIENT_SECRET=${DRONE_GITHUB_CLIENT_SECRET}
      - DRONE_GITHUB_SCOPE=repo,admin:repo_hook,user

      # Optional: bootstrap admin
      - DRONE_USER_CREATE=howlika-badarwada:admin,admin:true
      - DRONE_LOGS_DEBUG=true
      - DRONE_LOGS_TRACE=true

    restart: unless-stopped

  drone-runner:
    image: drone/drone-runner-docker:1
    container_name: drone-runner
    depends_on:
      - drone-server
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DRONE_RPC_PROTO=http
      - DRONE_RPC_HOST=drone-server              # internal service name resolves via Docker network
      - DRONE_RPC_SECRET=supersecret             # must match server
      - DRONE_RUNNER_CAPACITY=2
      - DRONE_RUNNER_NAME=local-runner
    restart: unless-stopped

volumes:
  drone-data: