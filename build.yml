pipeline:
  name: demo-ci
  stages:
    - stage:
        name: Build
        type: CI
        spec:
          execution:
            steps:
              - step:
                  type: Run
                  name: Build Docker
                  spec:
                    shell: Sh
                    command: |
                      docker build -t demo-app .
              - step:
                  type: Run
                  name: Push Image
                  spec:
                    shell: Sh
                    command: |
                      docker push demo-app